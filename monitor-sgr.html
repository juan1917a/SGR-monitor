const fmt = (n) => {
  if (!n && n !== 0) return "—";
  if (Math.abs(n) >= 1e12) return "$ " + (n/1e12).toFixed(1) + " B";
  if (Math.abs(n) >= 1e9)  return "$ " + (n/1e9).toFixed(1) + " MM";
  if (Math.abs(n) >= 1e6)  return "$ " + (n/1e6).toFixed(0) + " M";
  return "$ " + n.toLocaleString("es-AR");
};

const METRICS = [
  { key:"mora_pct",     label:"Mora %",          f: v => v.toFixed(2)+"%", color:"#f87171", unit:"%" },
  { key:"riesgo_vivo",  label:"Riesgo Vivo",      f: v => v.toFixed(2)+"x", color:"#a78bfa", unit:"x" },
  { key:"fondo",        label:"Fondo Integrado",  f: fmt,                   color:"#60a5fa", unit:"" },
  { key:"market_share", label:"Market Share",     f: v => v.toFixed(2)+"%", color:"#34d399", unit:"%" },
  { key:"inv_usd",      label:"Inv. USD %",       f: v => v.toFixed(1)+"%", color:"#fbbf24", unit:"%" },
];

const pr = r => ({ p:r[0],fondo:r[1],saldo:r[2],mora_monto:r[3],mora_pct:r[4],riesgo_vivo:r[5],inv_usd:r[6],market_share:r[7] });
const pt = r => ({ p:r[0],fondo:r[1],saldo:r[2],mora_monto:r[3],mora_pct:r[4],riesgo_vivo:r[5],inv_usd:0,market_share:100 });

const ALL_P = DB.t.map(r=>r[0]).sort();

function getSeries(sgr) {
  if (sgr==="__TOTAL__") return DB.t.map(pt);
  return (DB.d[sgr]||[]).map(pr);
}

const moraColor = v => v<2?"#10b981":v<5?"#f59e0b":"#ef4444";

const Pill = ({label, active, color="#3b82f6", onClick}) => (
  <button onClick={onClick} style={{
    background: active ? color+"25":"#1e293b",
    border: `1px solid ${active?color:"#334155"}`,
    color: active ? color : "#94a3b8",
    borderRadius:6, padding:"5px 11px", fontSize:12,
    cursor:"pointer", fontWeight:active?700:400,
    transition:"all 0.12s",
  }}>{label}</button>
);

  const md = METRICS.find(m=>m.key===metric);

  const fullSeries = useMemo(()=>getSeries(sgr),[sgr]);

  const filteredSeries = useMemo(()=>{
    return fullSeries.filter(r=>{
      const [y,mo] = r.p.split("-");
      if (year  && y !==year)  return false;
      if (month && mo!==month) return false;
      return true;
    });
  },[fullSeries,year,month]);

  // available months for current year filter
  const availMonths = useMemo(()=>{
    const s = new Set(ALL_P.filter(p=>!year||p.startsWith(year)).map(p=>p.split("-")[1]));
    return [...s].sort();
  },[year]);

  // snapshot period = last matching period across ALL SGRs
  const snapP = useMemo(()=>{
    let c = ALL_P;
    if (year)  c = c.filter(p=>p.startsWith(year));
    if (month) c = c.filter(p=>p.endsWith("-"+month));
    return c[c.length-1]||ALL_P[ALL_P.length-1];

    return DB.s.map(name=>{

      return {...row, name:name.replace(/ S\.G\.R\./i,"").trim(), full:name};
    }).filter(Boolean).sort((a,b)=>b[metric]-a[metric]);

  const chartData = filteredSeries.map(r=>({name:r.p, value:r[metric], saldo:r.saldo}));

              </span>}
            </div>

                  <CartesianGrid strokeDasharray="3 3" stroke="#1a2744"/>
                  <XAxis dataKey="name" tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false}
                    interval={Math.max(0,Math.floor(chartData.length/9)-1)}/>
                  <YAxis tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false}
                    tickFormatter={v=>v+md.unit}/>
                  <Tooltip content={<TT/>}/>

                </LineChart>
              </ResponsiveContainer>
            ):(
              <div style={{height:230,display:"flex",alignItems:"center",justifyContent:"center",color:"#334155",fontSize:13}}>

              </div>

          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:9,marginBottom:12}}>
            {METRICS.filter(m=>m.key!==metric).map(m2=>{
              const cd2=filteredSeries.map(r=>({name:r.p,value:r[m2.key]}));
              return (
                <div key={m2.key} onClick={()=>setMetric(m2.key)} style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:10,padding:"9px 6px 3px",cursor:"pointer"}}>
                  <div style={{paddingLeft:8,marginBottom:4,color:m2.color,fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>

                </div>

          </div>

          <div style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:12,overflow:"hidden"}}>

                  ))}</tr>
                </thead>

                      <td style={{padding:"6px 12px",textAlign:"right",color:"#34d399"}}>{r.market_share.toFixed(2)}%</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#fbbf24"}}>{r.inv_usd.toFixed(1)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>)}

        {tab==="snapshot" && (<>

            </div>
            <ResponsiveContainer width="100%" height={Math.max(200,snapData.length*17)}>
              <BarChart data={snapData} layout="vertical" margin={{top:0,right:45,left:5,bottom:0}}>

                  tickFormatter={v=>v+md.unit}/>
                <YAxis type="category" dataKey="name" tick={{fill:"#94a3b8",fontSize:9}} axisLine={false} tickLine={false} width={95}/>

                <Bar dataKey={metric} radius={[0,4,4,0]}>
                  {snapData.map((e,i)=>(
                    <Cell key={i} fill={metric==="mora_pct"?moraColor(e.mora_pct):md.color}/>
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

            <div style={{padding:"9px 15px",borderBottom:"1px solid #1e3a5f",color:"#475569",fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase"}}>
              Detalle — {snapP}
            </div>

              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead style={{position:"sticky",top:0,background:"#0d1526",zIndex:1}}>
                  <tr>{["#","SGR","Fondo","Saldo","Mora %","Riesgo Vivo","Mkt Share","Inv USD%"].map(h=>(
                    <th key={h} style={{padding:"7px 12px",textAlign:h==="#"||h==="SGR"?"left":"right",color:"#475569",fontSize:10,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid #1e3a5f"}}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {snapData.map((r,i)=>(
                    <tr key={r.full} style={{borderBottom:"1px solid #0f2744",background:i%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                      <td style={{padding:"6px 12px",color:"#334155",fontSize:11}}>{i+1}</td>

                      <td style={{padding:"6px 12px",textAlign:"right",color:"#a78bfa"}}>{fmt(r.saldo)}</td>

                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>)}
      </div>
    </div>
  );

const MESES_FULL = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const YEARS      = ["2021","2022","2023","2024","2025","2026"];
const ALL_P      = DB.t.map(r=>r[0]).sort();

const fmt = n => {
  if (!n && n!==0) return "—";
  if (Math.abs(n)>=1e12) return "$ "+(n/1e12).toFixed(1)+" B";
  if (Math.abs(n)>=1e9)  return "$ "+(n/1e9).toFixed(1)+" MM";
  if (Math.abs(n)>=1e6)  return "$ "+(n/1e6).toFixed(0)+" M";
  return "$ "+n.toLocaleString("es-AR");
};

const pr = r => ({
  p:r[0], fondo:r[1], fondo_disp:r[2], saldo:r[3], mora_monto:r[4],
  mora_pct:r[5], mora_gt90:r[6], inv_usd:r[7], gar_usd:r[8], net_fx:r[9],
  apal:r[10], market_share:r[11], riesgo_vivo:r[12]
});

function getSeries(sgr) {
  if (sgr==="__TOTAL__") return DB.t.map(pr);
  return (DB.d[sgr]||[]).map(pr);
}

const moraColor = v => v<2?"#10b981":v<5?"#f59e0b":"#ef4444";

// ── FILTER LOGIC ──────────────────────────────────────────────────────────────
// years: Set of selected years ("" = all)
// months: Set of selected months ("01","02",...) (empty = all)
// A row passes if:
//   - its year is in selectedYears (or selectedYears is empty)
//   - its month is in selectedMonths (or selectedMonths is empty)
function filterSeries(series, selectedYears, selectedMonths) {
  return series.filter(r => {
    const [y, mo] = r.p.split("-");
    if (selectedYears.size  > 0 && !selectedYears.has(y))   return false;
    if (selectedMonths.size > 0 && !selectedMonths.has(mo)) return false;
    return true;
  });
}

// ── PILL ─────────────────────────────────────────────────────────────────────
const Pill = ({label, active, color="#3b82f6", onClick}) => (
  <button onClick={onClick} style={{
    background: active ? color+"28" : "#1e293b",
    border: `1px solid ${active ? color : "#334155"}`,
    color: active ? color : "#94a3b8",
    borderRadius: 6, padding: "5px 11px", fontSize: 12,
    cursor: "pointer", fontWeight: active ? 700 : 400,
    transition: "all 0.1s",
  }}>{label}</button>
);

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
const TT = ({active, payload, label, fmtFn}) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"9px 13px",fontSize:12}}>
      <div style={{color:"#94a3b8",marginBottom:4}}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{color:p.color||p.stroke||"#e2e8f0",marginTop:2}}>
          <span style={{color:"#64748b"}}>{p.name}: </span>
          {fmtFn ? fmtFn(p.value) : p.value?.toFixed(2)}
        </div>
      ))}
    </div>
  );
};

// ── CHART COMPONENTS ──────────────────────────────────────────────────────────
// Custom shape: renders two overlapping rects in one bar slot
const OverlapBar = (props) => {
  const { x, y, width, height, wideColor, narrowColor, wideVal, narrowVal, maxVal, chartHeight } = props;
  if (!maxVal || maxVal === 0) return null;
  const wideH  = Math.max(0, (wideVal  / maxVal) * chartHeight);
  const narrowH= Math.max(0, (narrowVal / maxVal) * chartHeight);
  const wideW  = width;
  const narrowW= Math.max(4, width * 0.45);
  const cx     = x + width / 2;
  return (
    <g>
      <rect x={cx - wideW/2} y={y + height - wideH}   width={wideW}   height={wideH}   fill={wideColor}   rx={2}/>
      <rect x={cx - narrowW/2} y={y + height - narrowH} width={narrowW} height={narrowH} fill={narrowColor} rx={2}/>
    </g>
  );
};

function MoraChart({series}) {
  const raw = series.filter(r => r.mora_pct > 0);
  const maxVal = Math.max(...raw.map(r => r.mora_pct), 0.01);
  const data = raw.map(r => ({ name: r.p, mora_pct: r.mora_pct, mora_gt90: r.mora_gt90, _max: maxVal }));

  const CustomShape = (props) => {
    const { x, y, width, height } = props;
    const d = props.mora_pct ?? 0;
    const s = props.mora_gt90 ?? 0;
    if (!d) return null;
    const chartH = height / (d / maxVal);
    return <OverlapBar x={x} y={y} width={width} height={height}
      wideColor="#3b82f6" narrowColor="#1e3a8a"
      wideVal={d} narrowVal={s} maxVal={maxVal} chartHeight={chartH}/>;
  };

  return (
    <div style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:12,padding:"16px 8px 8px"}}>
      <div style={{paddingLeft:14,marginBottom:6,color:"#f87171",fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>
        Mora — Total vs Mayor 90 días
      </div>
      <div style={{paddingLeft:14,marginBottom:8,display:"flex",gap:16,fontSize:10}}>
        <span style={{color:"#1e3a8a",fontWeight:700}}>■ <span style={{color:"#94a3b8"}}>Mora &gt;90d</span></span>
        <span style={{color:"#3b82f6",fontWeight:700}}>■ <span style={{color:"#94a3b8"}}>Mora Total</span></span>
      </div>
      <ResponsiveContainer width="100%" height={220}>
        <BarChart data={data} margin={{top:4,right:16,left:4,bottom:4}} barCategoryGap="35%">
          <CartesianGrid strokeDasharray="3 3" stroke="#1a2744"/>
          <XAxis dataKey="name" tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false}
            interval={Math.max(0,Math.floor(data.length/10)-1)}/>
          <YAxis tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v.toFixed(1)+"%"}/>
          <Tooltip formatter={(v,n) => [v?.toFixed(2)+"%", n]} labelStyle={{color:"#94a3b8"}} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:12}}/>
          <Bar dataKey="mora_pct" name="Mora Total" shape={<CustomShape/>} fill="#3b82f6"/>
        </BarChart>
      </ResponsiveContainer>
    </div>
  );
}

function FXChart({series}) {
  const data = series.map(r => ({
    name: r.p, "Inv (% USD)": r.inv_usd, "Gar (% USD)": r.gar_usd, "Net FX Exposure": r.net_fx
  }));
  const minW = Math.max(data.length * 22, 400);
  return (
    <div style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:12,padding:"16px 8px 8px"}}>
      <div style={{paddingLeft:14,marginBottom:10,color:"#34d399",fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>
        Exposición FX — Inv USD % / Gar USD % / Net FX
      </div>
      <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={data} margin={{top:4,right:16,left:4,bottom:4}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a2744"/>
              <XAxis dataKey="name" tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false}
            interval={Math.max(0,Math.floor(data.length/10)-1)}/>
              <YAxis tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
              <ReferenceLine y={0} stroke="#334155" strokeDasharray="4 2"/>
              <Tooltip content={<TT fmtFn={v=>v?.toFixed(1)+"%"}/>}/>
              <Legend wrapperStyle={{fontSize:11,color:"#94a3b8"}}/>
              <Bar dataKey="Inv (% USD)" fill="#34d399" radius={[3,3,0,0]} maxBarSize={10}/>
              <Bar dataKey="Gar (% USD)" fill="#f472b6" radius={[3,3,0,0]} maxBarSize={10}/>
              <Line dataKey="Net FX Exposure" stroke="#fbbf24" strokeWidth={2} strokeDasharray="5 3" dot={false} type="monotone"/>
            </ComposedChart>
          </ResponsiveContainer>
    </div>
  );
}

function ApalChart({series}) {
  const data = series.map(r => ({
    name: r.p,
    disp: Math.round(r.fondo_disp/1e6),
    gar:  Math.round(r.saldo/1e6),
    apal: r.apal,
  }));
  const maxVal = Math.max(...data.map(r => r.gar), 1);
  const fmtM = v => v >= 1000 ? (v/1000).toFixed(1)+"B" : v+"M";

  const CustomShape = (props) => {
    const { x, y, width, height } = props;
    const gar  = props.gar  ?? 0;
    const disp = props.disp ?? 0;
    if (!gar) return null;
    const chartH = height / (gar / maxVal);
    return <OverlapBar x={x} y={y} width={width} height={height}
      wideColor="#60a5fa" narrowColor="#1e3a8a"
      wideVal={gar} narrowVal={disp} maxVal={maxVal} chartHeight={chartH}/>;
  };

  return (
    <div style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:12,padding:"16px 8px 8px"}}>
      <div style={{paddingLeft:14,marginBottom:6,color:"#60a5fa",fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>
        Disponible vs Garantías (MM$) · Apalancamiento (eje der.)
      </div>
      <div style={{paddingLeft:14,marginBottom:8,display:"flex",gap:16,fontSize:10}}>
        <span style={{color:"#1e3a8a",fontWeight:700}}>■ <span style={{color:"#94a3b8"}}>Disp (Izq)</span></span>
        <span style={{color:"#60a5fa",fontWeight:700}}>■ <span style={{color:"#94a3b8"}}>Gar (Izq)</span></span>
        <span style={{color:"#a78bfa",fontWeight:700}}>- - <span style={{color:"#94a3b8"}}>Apalancamiento (Der)</span></span>
      </div>
      <ResponsiveContainer width="100%" height={220}>
        <ComposedChart data={data} margin={{top:4,right:44,left:4,bottom:4}} barCategoryGap="35%">
          <CartesianGrid strokeDasharray="3 3" stroke="#1a2744"/>
          <XAxis dataKey="name" tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false}
            interval={Math.max(0,Math.floor(data.length/10)-1)}/>
          <YAxis yAxisId="left" tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false} tickFormatter={fmtM}/>
          <YAxis yAxisId="right" orientation="right" tick={{fill:"#a78bfa",fontSize:9}} axisLine={false} tickLine={false}
            tickFormatter={v=>v+"x"}/>
          <Tooltip formatter={(v,n) => [typeof v==="number"&&v<1000?v.toFixed(2)+"x":fmtM(v), n]}
            labelStyle={{color:"#94a3b8"}} contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:12}}/>
          <Bar yAxisId="left" dataKey="gar" name="Garantías" shape={<CustomShape/>} fill="#60a5fa"/>
          <Line yAxisId="right" dataKey="apal" name="Apalancamiento" stroke="#a78bfa" strokeWidth={2} strokeDasharray="5 3" dot={false} type="monotone"/>
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

  return (
    <div style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:12,padding:"16px 8px 8px"}}>
      <div style={{paddingLeft:14,marginBottom:6,color:"#f87171",fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>
        Evolución Mora %
      </div>
      <div style={{paddingLeft:14,marginBottom:8,display:"flex",gap:16,fontSize:10}}>
        <span style={{color:"#f87171"}}>■ Mora Total <span style={{color:"#475569",fontWeight:400}}>(eje izq.)</span></span>
        <span style={{color:"#c084fc"}}>■ Mora &gt;90d <span style={{color:"#475569",fontWeight:400}}>(eje der.)</span></span>
      </div>
      <ResponsiveContainer width="100%" height={220}>
        <LineChart data={data} margin={{top:4,right:44,left:4,bottom:4}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1a2744"/>
          <XAxis dataKey="name" tick={{fill:"#475569",fontSize:9}} axisLine={false} tickLine={false}
            interval={Math.max(0,Math.floor(data.length/10)-1)}/>
          <YAxis yAxisId="left"  tick={{fill:"#f87171",fontSize:9}} axisLine={false} tickLine={false}
            tickFormatter={v=>v+"%"}/>
          <YAxis yAxisId="right" orientation="right" tick={{fill:"#c084fc",fontSize:9}} axisLine={false} tickLine={false}
            tickFormatter={v=>v+"%"}/>
          <Tooltip content={<TT fmtFn={v=>v?.toFixed(2)+"%"}/>}/>

}

// ── KPI ROW ───────────────────────────────────────────────────────────────────
function KpiRow({latest}) {
  if (!latest) return null;
  const cards = [
    {label:"Mora Total",       value:latest.mora_pct.toFixed(2)+"%",    color:moraColor(latest.mora_pct)},
    {label:"Mora >90d",        value:latest.mora_gt90.toFixed(2)+"%",   color:moraColor(latest.mora_gt90)},
    {label:"Fondo Computable", value:fmt(latest.fondo),                 color:"#60a5fa"},
    {label:"Fondo Disponible", value:fmt(latest.fondo_disp),            color:"#93c5fd"},
    {label:"Saldo Vigente",    value:fmt(latest.saldo),                 color:"#a78bfa"},
    {label:"Apalancamiento",   value:latest.apal.toFixed(2)+"x",        color:"#c4b5fd"},
    {label:"Inv USD %",        value:latest.inv_usd.toFixed(1)+"%",     color:"#34d399"},
    {label:"Gar USD %",        value:latest.gar_usd.toFixed(1)+"%",     color:"#f472b6"},
    {label:"Net FX",           value:latest.net_fx.toFixed(1)+"%",      color:latest.net_fx>0?"#ef4444":"#10b981"},
    {label:"Market Share",     value:latest.market_share.toFixed(2)+"%",color:"#fbbf24"},
  ];
  return (
    <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
      {cards.map(c=>(
        <div key={c.label} style={{flex:1,minWidth:85,background:"linear-gradient(135deg,#1e293b,#0f172a)",border:"1px solid #1e3a5f",borderRadius:10,padding:"10px 13px"}}>
          <div style={{color:"#475569",fontSize:9,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>{c.label}</div>
          <div style={{color:c.color,fontSize:15,fontWeight:700}}>{c.value}</div>
        </div>
      ))}
    </div>
  );
}

// ── FILTER SUMMARY ────────────────────────────────────────────────────────────
function FilterSummary({selectedYears, selectedMonths, count}) {
  const yLabel = selectedYears.size === 0 ? "Todos los años"
    : [...selectedYears].sort().join(", ");
  const mLabel = selectedMonths.size === 0 ? "Todos los meses"
    : [...selectedMonths].sort().map(m => MESES[parseInt(m)]).join(" + ");
  return (
    <div style={{marginLeft:"auto",color:"#64748b",fontSize:11,textAlign:"right"}}>
      <span style={{color:"#93c5fd",fontWeight:600}}>{yLabel}</span>
      {" · "}
      <span style={{color:"#c4b5fd",fontWeight:600}}>{mLabel}</span>
      {" · "}
      <span style={{color:"#475569"}}>{count} punto{count!==1?"s":""}</span>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function DashboardProfundo() {
  const [sgr,           setSgr]           = useState("__TOTAL__");
  const [selectedYears, setSelectedYears] = useState(new Set());
  const [selectedMonths,setSelectedMonths]= useState(new Set());

  const fullSeries = useMemo(() => getSeries(sgr), [sgr]);
  const series     = useMemo(() => filterSeries(fullSeries, selectedYears, selectedMonths), [fullSeries, selectedYears, selectedMonths]);
  const latest     = series[series.length - 1];

  // months that exist in the data (filtered by selected years)
  const availMonths = useMemo(() => {
    const base = selectedYears.size > 0
      ? ALL_P.filter(p => selectedYears.has(p.split("-")[0]))
      : ALL_P;
    return [...new Set(base.map(p => p.split("-")[1]))].sort();
  }, [selectedYears]);

  const toggleYear = y => {
    setSelectedYears(prev => {
      const n = new Set(prev);
      n.has(y) ? n.delete(y) : n.add(y);
      return n;
    });
    // reset months that might not exist in new year selection
    setSelectedMonths(new Set());
  };

  const toggleMonth = mo => {
    setSelectedMonths(prev => {
      const n = new Set(prev);
      n.has(mo) ? n.delete(mo) : n.add(mo);
      return n;
    });
  };

  const clearAll = () => { setSelectedYears(new Set()); setSelectedMonths(new Set()); };

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#020918",minHeight:"100vh",color:"#e2e8f0"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#0f172a,#0c1529,#0f172a)",borderBottom:"1px solid #1e3a5f",padding:"15px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🔬</div>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>SGR Profundo — Análisis Detallado</div>
            <div style={{color:"#475569",fontSize:11}}>40 SGRs activas · Ene 2021 – Ene 2026</div>
          </div>
        </div>
        <select value={sgr} onChange={e => setSgr(e.target.value)}
          style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#f1f5f9",padding:"7px 11px",fontSize:12,cursor:"pointer",outline:"none",minWidth:250}}>
          <option value="__TOTAL__">📊 TOTAL MERCADO</option>
          {DB.s.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
      </div>

      {/* FILTER BAR */}
      <div style={{background:"#08111e",borderBottom:"1px solid #1e3a5f",padding:"11px 22px 10px",display:"flex",flexDirection:"column",gap:9}}>

        {/* Row 1: years */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",minWidth:52}}>Año</span>
          <Pill label="Todos" active={selectedYears.size===0} onClick={clearAll}/>
          {YEARS.map(y => (
            <Pill key={y} label={y} active={selectedYears.has(y)} color="#3b82f6" onClick={() => toggleYear(y)}/>
          ))}
        </div>

        {/* Row 2: months — multi-select */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",minWidth:52}}>Mes</span>
          <Pill label="Todos" active={selectedMonths.size===0} color="#8b5cf6"
            onClick={() => setSelectedMonths(new Set())}/>
          {availMonths.map(mo => (
            <Pill key={mo} label={MESES[parseInt(mo)]} active={selectedMonths.has(mo)} color="#8b5cf6"
              onClick={() => toggleMonth(mo)}/>
          ))}

          {/* Active selection summary */}
          {(selectedYears.size > 0 || selectedMonths.size > 0) && (
            <FilterSummary selectedYears={selectedYears} selectedMonths={selectedMonths} count={series.length}/>
          )}
        </div>

        {/* Selection hint */}
        {selectedMonths.size > 1 && (
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{fontSize:10,color:"#4b5563"}}>
              Mostrando evolución de {[...selectedMonths].sort().map(m=>MESES_FULL[parseInt(m)]).join(" + ")} a lo largo de {selectedYears.size>0?[...selectedYears].sort().join(", "):"todos los años"}
            </div>
            <div style={{flex:1,height:1,background:"#1e3a5f"}}/>
          </div>
        )}
      </div>

      <div style={{padding:"18px 22px"}}>

        {/* ENTITY TITLE */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700}}>
            {sgr==="__TOTAL__" ? "📊 Mercado Total" : sgr}
          </div>
          {latest && (
            <div style={{color:"#475569",fontSize:12,marginTop:2}}>
              Último dato en selección: <span style={{color:"#93c5fd"}}>{latest.p}</span>
              {series.length > 1 && <span style={{color:"#334155"}}> · {series.length} períodos</span>}
            </div>
          )}
        </div>

        {series.length === 0 ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:"#334155",fontSize:14}}>
            Sin datos para la selección actual
          </div>
        ) : (<>
          <KpiRow latest={latest}/>

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div style={{height:1,flex:1,background:"#1e3a5f"}}/>
            <span style={{color:"#4b5563",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>GRÁFICOS</span>
            <div style={{height:1,flex:1,background:"#1e3a5f"}}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(400px,1fr))",gap:14}}>
            <MoraChart     series={series}/>
            <FXChart       series={series}/>
            <ApalChart     series={series}/>
            <MoraLineChart series={series}/>
          </div>

          {/* TABLE */}
          <div style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:12,overflow:"hidden",marginTop:14}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid #1e3a5f",color:"#475569",fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase"}}>
              Datos completos — {series.length} períodos
            </div>
            <div style={{overflowX:"auto",maxHeight:260,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead style={{position:"sticky",top:0,background:"#0d1526",zIndex:1}}>
                  <tr>
                    {["Período","Fondo Comp.","Fondo Disp.","Saldo","Mora %","Mora >90d","Inv USD","Gar USD","Net FX","Apal.","Mkt Share"].map(h=>(
                      <th key={h} style={{padding:"7px 12px",textAlign:h==="Período"?"left":"right",color:"#475569",fontSize:10,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid #1e3a5f",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...series].reverse().map((r,i)=>(
                    <tr key={r.p} style={{borderBottom:"1px solid #0f2744",background:i%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                      <td style={{padding:"6px 12px",color:"#94a3b8",fontWeight:600}}>{r.p}</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#60a5fa"}}>{fmt(r.fondo)}</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#93c5fd"}}>{fmt(r.fondo_disp)}</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#a78bfa"}}>{fmt(r.saldo)}</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:moraColor(r.mora_pct)}}>{r.mora_pct.toFixed(2)}%</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:moraColor(r.mora_gt90)}}>{r.mora_gt90.toFixed(2)}%</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#34d399"}}>{r.inv_usd.toFixed(1)}%</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#f472b6"}}>{r.gar_usd.toFixed(1)}%</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:r.net_fx>0?"#ef4444":"#10b981"}}>{r.net_fx.toFixed(1)}%</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#c4b5fd"}}>{r.apal.toFixed(2)}x</td>
                      <td style={{padding:"6px 12px",textAlign:"right",color:"#fbbf24"}}>{r.market_share.toFixed(2)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>)}
      </div>
    </div>
  );
}
